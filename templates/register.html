{% extends 'base.html' %}
{% block content %}
<div class="form-box">
    <h2>Create an Account 🚀</h2>
    <form method="POST">
        <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="John Doe" required></div>
        <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Create a strong password" required></div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Login</a></p>
</div>
{% endblock %}
