{% extends 'base.html' %}
{% block content %}
<h2>Registered Users</h2>
<a href="{{ url_for('admin_dashboard') }}" class="btn" style="margin-bottom:15px;">&larr; Back to Dashboard</a>
<table>
    <tr><th>ID</th><th>Name</th><th>Email</th></tr>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td><td>{{ user.name }}</td><td>{{ user.email }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
