{% extends 'base.html' %}
{% block content %}
<div class="form-box">
    <h2>Welcome Back 👋</h2>
    <form method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Secure Login</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 600;">Sign Up</a></p>
</div>
{% endblock %}
