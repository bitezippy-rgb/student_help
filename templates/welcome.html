<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | StudentServices</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Premium Animated Gradient Background */
        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #4f46e5, #10b981, #3b82f6, #059669);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Effect */
        .welcome-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            color: white;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUpFade 1s ease-out forwards;
            max-width: 500px;
            width: 90%;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-card h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
        .welcome-card p { font-size: 1.1rem; margin-bottom: 40px; opacity: 0.9; }

        /* Advanced White Button */
        .btn-welcome {
            background: #ffffff;
            color: #4f46e5;
            padding: 16px 36px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-welcome:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.2);
            color: #4338ca;
        }

        .arrow { transition: transform 0.3s; }
        .btn-welcome:hover .arrow { transform: translateX(5px); }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>Welcome to StudentServices</h1>
        <p>Your one-stop premium platform for academic excellence and fast project delivery.</p>
        
        <a href="{{ url_for('home') }}" class="btn-welcome">
            Click to Continue <span class="arrow">➔</span>
        </a>
    </div>

</body>
</html>
